<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F8F5EF"/>
  <text x="64" y="78" fill="#14213D" font-family="Inter, Arial" font-size="34" font-weight="700">QuantRegimeTracer architecture overview</text>
  <text x="64" y="116" fill="#667085" font-family="Inter, Arial" font-size="18">Data → features → HMM/Markov → validation → guarded memo</text>
  <g font-family="Inter, Arial" font-size="17" font-weight="600">
    <g transform="translate(64 190)">
      <rect width="180" height="110" rx="20" fill="#FFFFFF" stroke="#D8CFC2"/>
      <text x="24" y="44" fill="#14213D">Market data</text><text x="24" y="74" fill="#667085" font-weight="400">sample/live/CSV</text>
    </g>
    <g transform="translate(286 190)">
      <rect width="180" height="110" rx="20" fill="#FFFFFF" stroke="#D8CFC2"/>
      <text x="24" y="44" fill="#14213D">Features</text><text x="24" y="74" fill="#667085" font-weight="400">vol, drawdown, RSI</text>
    </g>
    <g transform="translate(508 190)">
      <rect width="180" height="110" rx="20" fill="#EAF4F1" stroke="#BFD8D3"/>
      <text x="24" y="44" fill="#14213D">Regime engine</text><text x="24" y="74" fill="#2A6F68" font-weight="400">GaussianHMM</text>
    </g>
    <g transform="translate(730 190)">
      <rect width="180" height="110" rx="20" fill="#FFFFFF" stroke="#D8CFC2"/>
      <text x="24" y="44" fill="#14213D">Markov layer</text><text x="24" y="74" fill="#667085" font-weight="400">Pij, entropy</text>
    </g>
    <g transform="translate(952 190)">
      <rect width="240" height="110" rx="20" fill="#FFFFFF" stroke="#D8CFC2"/>
      <text x="24" y="44" fill="#14213D">Validation + memo</text><text x="24" y="74" fill="#667085" font-weight="400">baseline, holdout, guardrails</text>
    </g>
  </g>
  <g stroke="#2A6F68" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M244 245h42"/><path d="M466 245h42"/><path d="M688 245h42"/><path d="M910 245h42"/>
