  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2A6F68"/></marker></defs>
  <g transform="translate(64 382)" font-family="Inter, Arial">
