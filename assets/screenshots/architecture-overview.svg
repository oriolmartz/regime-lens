    <text x="36" y="100" fill="#D0D5DD" font-size="18">γ posterior state mass · H(γ) transition uncertainty · 1/(1-Pii) persistence · AIC/BIC temporal holdout</text>
    <text x="36" y="148" fill="#D0D5DD" font-size="18">Readable UI labels first, mathematical basis visible in tooltips and validation panels.</text>
